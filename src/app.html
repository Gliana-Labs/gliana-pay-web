<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg" href="%sveltekit.assets%/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="Hu1oECN8-yL6zmjmSM-y2ec05fxy-btuWIu-Dg0P8DE" />

    <!-- Default SEO Meta Tags -->
    <meta name="description" content="GlianaPay - Web3 tipping platform for streamers. Accept SOL tips with real-time OBS alerts. Powered by Solana blockchain." />
    <meta name="keywords" content="streaming, tips, donations, Solana, SOL, crypto, Web3, OBS, alerts, streamer, monetization" />
    <meta name="author" content="GlianaLabs" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://glianapay.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://glianapay.com/" />
    <meta property="og:title" content="GlianaPay - Web3 Tipping for Streamers" />
    <meta property="og:description" content="Accept SOL tips with real-time OBS alerts. Powered by Solana blockchain." />
    <meta property="og:image" content="https://glianapay.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="GlianaPay" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://glianapay.com/" />
    <meta name="twitter:title" content="GlianaPay - Web3 Tipping for Streamers" />
    <meta name="twitter:description" content="Accept SOL tips with real-time OBS alerts. Powered by Solana blockchain." />
    <meta name="twitter:image" content="https://glianapay.com/og-image.png" />
    <meta name="twitter:site" content="@glianalabs" />
    <meta name="twitter:creator" content="@glianalabs" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "GlianaPay",
        "description": "Web3 tipping platform for streamers. Accept SOL tips with real-time OBS alerts.",
        "url": "https://glianapay.com",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "creator": {
          "@type": "Organization",
          "name": "GlianaLabs",
          "url": "https://glianalabs.com",
          "sameAs": [
            "https://twitter.com/glianalabs"
          ]
        },
        "image": "https://glianapay.com/og-image.png"
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
