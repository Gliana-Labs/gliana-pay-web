<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="1200" height="630" fill="#020617"/>
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="315" x2="600" y2="315">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gradient)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Logo [GP] -->
  <text x="600" y="280" font-family="JetBrains Mono, monospace" font-size="120" font-weight="bold" text-anchor="middle">
    <tspan fill="#22d3ee">[</tspan><tspan fill="white">GP</tspan><tspan fill="#ec4899">]</tspan>
  </text>

  <!-- Main text -->
  <text x="600" y="380" font-family="Inter, sans-serif" font-size="48" font-weight="600" text-anchor="middle" fill="white">
    GlianaPay
  </text>

  <!-- Tagline -->
  <text x="600" y="440" font-family="Inter, sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="#94a3b8">
    Web3 Tipping Platform for Streamers
  </text>

  <!-- Features -->
  <text x="600" y="500" font-family="Inter, sans-serif" font-size="20" font-weight="500" text-anchor="middle" fill="#22d3ee">
    Accept SOL tips with real-time OBS alerts
  </text>

  <!-- Solana badge -->
  <rect x="520" y="540" width="160" height="40" rx="20" fill="#14f195" fill-opacity="0.2"/>
  <text x="600" y="568" font-family="Inter, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#14f195">
    ⚡ Solana
  </text>
</svg>
