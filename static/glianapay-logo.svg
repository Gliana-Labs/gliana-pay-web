<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background with rounded corners -->
  <rect width="1024" height="1024" rx="180" fill="#0a0a0b"/>

  <!-- Glow background -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#glow)"/>

  <!-- [GP] text, centered -->
  <text
    x="512"
    y="512"
    font-family="JetBrains Mono, monospace"
    font-size="380"
    font-weight="bold"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-8"
  >
    <tspan fill="#22d3ee">[</tspan><tspan fill="white" dx="-4">GP</tspan><tspan fill="#ec4899" dx="-4">]</tspan>
  </text>
</svg>
